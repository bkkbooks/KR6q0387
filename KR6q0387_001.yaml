body:
  text: 參學門人許元釗録德清居士蔡武仁和居士卓發之同校萬曆庚申季夏之日麥道人抱影松窗萬念灰冷有設難者過道人之門相與跏趺而坐時薰風南來殿角微涼設難者傾誠以告道人曰或謂初祖西來直指人心見性成佛掃除觀行不立文字參禪一句已是疣云何曹洞臨濟諸師更立三玄三要五位三關如是等豈不悖初祖西來之意耶答曰冰輪既湧有目者不待指標妙性圓明人人本具直指二字早成疣況其他哉問曰如師所言則佛法二字得不成斷滅去耶答曰誠矣哉啓豫者是言也何則祖佛出興於世其奈衆生處處成滯是以觀根逗教而設種種法門請試言之世尊出現始則周行七步終則瞬目拈花乃至談經三百餘會住世七十九年節節目目必欲衆生開示悟入佛之知見奈衆生樂禪定者一味沉空滯寂博知見者入海算沙沉空滯寂者迷性而不返入海算沙者途岐而無獲是以達摩大師掃除觀行不立文字直指人心見性成佛問曰單傳之旨既聞命矣云何初祖已還觀行雖除心性之文不無流布答曰正道寂寥雖有修而難會邪途喧擾實無習而易侵初祖始則不立文字慮恐後代兒孫不能神悟將使邪正無分紫朱莫辨只得向語言上説心説性一一指陳重重開曉是則言言見諦句句朝宗豈與尋行數墨之徒同日而語哉問曰初祖已下心性之説直捷簡易領荷者不難云何二派之後復立種種門庭答曰心性之説只貴一信到底永無疑惑如二祖之安心三祖之懺罪乃至大梅只管即心即佛一任非心非佛可為明鑒其奈法久弊生學者知解依通而魔外狗偷鼠竊動成窠臼差落顧佇情見坑深無可哀救勞他尊宿互相提唱或君視臣臣奉君而君臣道合或主看賓賓驗主而賓主相參顛拈倒弄喝素為緇大都使人情見消忘偷心斷絶如臨濟大師云山僧有時一喝如金剛寶劒有時一喝如踞地師子有時一喝如探竿影草有時一喝不作一喝用有時主看賓有時賓看主有時主看主有時賓看賓三玄三要七事隨身皆是辨魔揀異知其邪正不得已而為之也是與直指之道間不容髮豈與今之趂口舌利便兢人我是非為能事究竟者同耳殷因於夏周因於殷損益可知則古人如是乎簡易後人如是乎奇特智者了之一而已矣問曰古人作家相見師資雅合亦以此為禪悅法喜云何臨濟謂三玄七事皆辨魔揀異之説竊恐未必盡然答曰作家相見師資雅合如永嘉之參六祖黃蘗之歸百丈覿面相呈當機不讓如見家裏人説家裏話豈以科判料揀習學而為之耶實家常之説耳無奇特之有無窮盡之有又如北人見北客説北話源源不已何須習學而能其南人見之但瞪瞢瞻視不知所措以為奇特其南人見南客説南話疾捷無滯而北人亦然是則或有可學者焉海外有形語之國口不能言而相喻以形其以形語也捷於言使豫學之不亦難乎是以學語之流兢口舌是非者祗益自勞而於道實無毫末之益汝能一回親到則不學而能故軻氏云欲其子之齊語也引而置之莊嶽之間數年雖日撻而求其楚不可得矣時人稱善知識者始則把古人公案一一思維計較望空穿鑿或復以訛傳訛𮞏相聾瞽終則裝大模樣弄小聰明不鑒來機利鈍一味以大帽子蓋戴使新學者傾心渴仰及乎微細盤桓則宗門教門玄學義學觸事面墻雲門大師呼此輩為半日師也楞嚴云如何賊人假我衣服裨販如來夫子亦曰色厲而內荏其猶穿窬之盜誠法門之衰相也問曰直指之道一而已矣分而為五者何也答曰千途萬轍百家異唱同歸一致皆悉以心印心發揚直指之道也但六祖以下人物繁昌機宜不一觀根逗教應病與藥門庭施設自是不同授受之間不失故步五家宗派由是分焉何則當機痛快者無尚臨濟唱和謹嚴者無尚溈仰施設高古不容輳泊者無尚雲門剖柝詳明而了無壅滯者無尚法眼照用潛密若萬派之會滄溟權實圓該如千燈之共一室安得不歸於曹洞矣斯皆不分而分異而無異苟欲妄分同異而彼是此非是為辨空花之濃淡較兔角之短長一何謬哉問曰直指之道機前領荷已涉廉纖言外承當早成途轍安有下疑情看話頭之説至若死坐蒲團如守尸鬼稱究竟者無乃污辱佛祖門庭者乎答曰黃蘗大師云參禪一事乃為最下根衆生所設之法門也上根利智之人安有下疑情看話頭之説哉其奈情與世異道隨物遷學者不以生死大事為重任惟期明會機緣向古人舌頭上安身立命望空穿鑿人我是非逾高逾大生死牢關逾深逾固嗚呼欲求禪道之興其可得耶所以大慧高峯一味教人看話頭下疑情孜孜密密苦口叮嚀如貓捕鼠如抱卵至於用力之久一旦豁然開悟可謂慶快平生者矣觀彼死坐蒲團一念不動者乃告子之弗求無想之異熟佛祖叱此輩為外道孔孟拒此輩為異端污辱宗門無過於是問曰死坐蒲團一念不動者與告子之弗求無想之異熟其宗趣何如而聖賢皆弗之許答曰聖賢之學以見道為本一徹永徹一悟頓悟徹悟之後無纖毫繫念者才是達摩大師直指人心見性成佛之道也此中纖悉不存何修證動靜之有哉雖然如此要非斷滅虗無之説也何則如一剎那三昧世尊發心出家多劫學道成佛利生入微塵國遍坐道場直至涅槃皆不離一剎那三昧一剎那三昧亦攝世尊如是等事淨盡無餘剎那剎那皆悉如是故云一念普周於沙界又云一念普觀無量劫所以楞嚴云於一毫端現寶王剎坐微塵裏轉大法輪是知直指之道不可以有無修證得失是非邪正久近生佛凡聖而目之也故曰理法界可説禪乎曰不可事法界可説禪乎曰不可理事無礙法界可説禪乎曰不可事事無礙法界可説禪乎曰可吾觀德山棒臨濟喝麻三斤乾屎橛與世尊一剎那三昧曾無一間之別其間觀行文字尚不容其毫髮況死坐蒲團如守死鬼者名為跛驢乘瞎驢事擔板漢隻眼龜何足道哉豈但最上一乘而以見道為本至於小大偏圓之教兼但對帶之乘皆以見道為宗而以修證隨之故曰見道方修道不見復何修所以小乘四果三道具焉何則須陀洹為見道斯陀含阿那含為修道阿羅漢為證果大乘亦然何則初地初心為見道初地後心至金剛道後為修道妙覺果海為證果是為三乘漸次無差但心有大小為異耳雲棲大師云不見道而率意修行者愚也無燭夜遊昧所向故豈直昧所向而已行之不止將不免墮坑落塹之患矣何道業之可究竟也告子曰不得於言佛求於心不得於心弗求於氣斯乃不知頓明自性但將識心勉強遏捺如石壓草名為不動與今之盲修瞎練者無異也何則機前領荷言外承當者不待言也其次則當有疑有悟然後有修有證看話頭起疑情即此意耳不得於言當求於心以起疑不得於心當加精進以使悟得於言者機前領荷者也求於心者有疑有悟者也小疑小悟大疑大悟疑得去悟得來世出世間之共轍也若能明悟自心自心尚無有靜何況有動今告子之不動心者非勉強遏捺而何也況乎內守幽間猶為客塵分別影事流注生滅曾無暫息此與動靜雙忘之地何止千里萬里故祖師叱此輩為落空忘的外道魂不散的死人黑山鬼窟曾無有異無想之異熟者無想乃天名也異熟第八識名異熟識無想之異熟乃證無想天之異熟識也楞嚴云如第四禪無聞比丘心慮灰凝經五百劫是人既以生滅為因不能發生不生滅性初半劫滅後半劫生如是一類名無想天是人因中不聞法故妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄即拘舍利等非色非空昧為冥諦者也此人以不聞正法不悟自心不知方便漸次死坐蒲團如守死鬼以稱究竟是為迷中倍人如來號為可憐愍者問曰如師所言法門之弊莫甚枯禪已聞命矣古人道實際理地不受一塵今時門頭不捨一法豈一心而有兩地也答曰妙含萬法而方圓任器者一心也何兩地之足異哉況一心元有體用之名其體則曰實際理地不受一塵其用則曰今時門頭不捨一法方其不受一塵之地而能萬有迭彰是為體中之用方其萬有迭彰之處而能法法皆真是為用中之體又體中之萬用而法法具真空之妙體即用中之性體而頭頭含妙有之無窮所謂塵塵混入剎剎圓融是為體用如如也此即曹洞宗五位偏正君臣何則其體為正中來其用為偏中至體中之用為正中偏用中之體為偏中正體用如如為兼中到如他宗之四賓主三玄要莫不皆然先儒亦云喜怒哀樂之未發謂之中發而皆中節謂之和未發者體也已發者用也方其未發之中已發者存焉方其已發之中未發者存焉此曹洞宗所謂正中偏偏中正也未發即發發即未發本來一體初無兩事故曰致中和天地位焉萬物育焉若能於此塵塵無礙徹底掀騰百尺竿頭翻身更入此曹洞所謂體用如如兼中到也問曰既稱體用如如則舉體即用舉用即體何有空劫今時之別未發已發之分答曰此一言為偷心衲子之大病鈍根沙彌之赤幟何則祖師門下三玄五位各有所歸掠虗頭者一味瞞盰佛性儱侗真如豈識法海之幽玄禪宗之微妙但西域無慚外道以此儱侗為宗極作相違之邪見所謂一句合頭語萬劫繫驢橛懼之哉懼之哉問曰道人業報至時或順或逆境界現前甚至求取頭目髓腦妻妾眷屬如是等事如何排遣答曰了即業障本來空未了應須還宿債何須排遣然了之説難言者也何則有一徹永徹一悟頓悟無了之了有善巧方便了達之了所以古德云道人日用境界現前皆前業也夢幻也純真一如離異致也若以前業觀目前則境從業起業從心生心若無生業自何有若以夢幻觀目前則夢裏明明有六趣覺後空空無大千尚無大千有何境界若以純真一如觀目前則法法虗融心心寂滅劫奪毀辱何曾非我本師徵違納順怨債由來善友矣南嶽所以輕安如故肇師猶如劒斬清風良有以也問曰圓覺經云無礙清淨慧皆由禪定生云何祖師又云菩薩觀禪定如牢獄答曰楞嚴云因戒生定因定發慧乃菩薩修行之定論也又云自未得度先度人者菩薩發心自覺已圓能覺他者如來應世何則蓋以圓頓大乘利物為上不拘拘終滯死灰故云菩薩觀禪定為牢獄況禪定之學邪正甚多利害不少故曰枯木山前叉路多世人到此盡蹉跎何則禪定之多難以廣舉略而言之有世間禪有出世間小乘禪有大乘禪有最上一乘禪世間禪有九種即九次第定初禪曰離生喜樂定因離五欲而生身心喜樂故二禪曰定生喜樂定因入禪定而生喜樂故三禪曰離喜妙樂定身受寂滅心生妙樂故四禪曰捨念清淨定身心受滅苦樂雙忘故五曰無想定粗想不行故六曰空無邊處定色相既除空境現前無邊際故七曰識無邊處定色空雙泯識心無際故八曰無所有處定心境俱忘畢竟空寂故九曰非想非非想處定識性不動以滅研窮若存不存故此皆窮空不盡空理獨無想定外道所修其餘八種邪正所共若從豫流見道修者即名鈍根二乘若從外道窮空不歸不遇佛僧不悟正法迷漏無聞當入輪轉故名世間禪也以不能超色無色界故出世間禪即真如三昧又名滅盡定又名一行三昧唯見道者或須陀洹或阿羅漢或初地初心或八地等位既悟一切諸法唯是一心從本已來離言説相離名字相離心緣相畢竟平等無有變易不可破壞入三昧時不住見相不住得相三界九地心及心所一切不行名出世間禪大乘小乘觀法無差但度生不度生為異耳最上一乘禪者即前一剎那三昧云云問曰圓覺經三觀之理與四病之文似無差別此則曰取靜為行靜慧發生彼則曰永息諸念得一切性寂然平等此則曰變化諸幻而開幻衆彼則曰我於本心作種種行此則曰了知身心皆為罣礙不依諸礙永得超過一切礙無礙境煩惱涅槃不相留礙彼則曰我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂只一經之內一般修習何故此則為觀彼則為病答曰前不云乎大小偏圓之教兼但對帶之乘一切皆以見道為首然後修證隨之經有明文汝自昧焉何則空觀云若諸菩薩悟淨圓覺以淨覺心取淨為行假觀云若諸菩薩悟淨圓覺以淨覺心知覺心性及於根塵皆由幻化即起諸幻以除幻者變化諸幻而開幻衆中道云若諸菩薩悟淨圓覺以淨覺心了知身心皆為罣礙是則三觀之文皆以見道為宗也行人如悟而修如修而證何迷謬之有故曰三種妙法門皆是覺隨順十方諸如來因此得成道四病云若復有人作如是言我今自心永息諸念我於本心作種種行我今永斷一切煩惱我於今者不斷生死不求涅槃生死涅槃無起滅念任彼一切隨諸法性是則未悟覺心堅持我相雖修諸行而生死之輪永熾故曰一切諸衆生皆由執我相無始妄流轉不得成菩提問曰如是三觀總別修習即復名為二十五輪經云三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提惟除頓覺人并法不隨順是則如悟而修如修而證十方如來無不因此云何頓覺之人而能超越答曰如悟而修如修而證果三世之達道也即信即悟即悟即修即修即證即證即了乃教外別傳之旨也前不云乎一徹永徹一悟頓悟徹悟之後更無毫𨤲繫念者才是達摩大師直指人心見性成佛之説所以祖師拈槌竪拂棒喝交馳皆是剎那三昧其間不落修證故曰唯除頓覺人黃蘗心要云六度萬行是魔説四諦十二因緣是魔説圓修三觀是魔説一真法界是魔説何則寧為心師無師於心故曰併法不隨順問曰大小諸乘與直指之道既聞命矣敢問淨土一門與圓頓之旨相為矛盾耶共為表裏耶答曰圓頓之旨與淨土一門實並行而不背者也何則山河國土共轉根本法輪鱗甲羽毛普現色身三昧雜居尚然彌陀淨土會心以為別乎此則曰直指人心見性成佛彼則曰唯心淨土本性彌陀此則以狗子佛性萬法歸一使上根者機前領荷中下者朝夕參疑彼則以寂光真境萬德洪名使上根者直下承當中下者孜孜在念古德云舉心盡是輪回業動念無非生死根要與太虗無句背如非吞個鐵混淪當知萬法歸一與萬德洪名皆鐵混淪也況迦葉阿難同稟靈山共傳茲土六朝遠祖羅十八員不世出之英才歸心蓮社五季永明總千萬種無小大之善行回向樂然皆各盛一時功垂萬世殆今末法佛道下衰自我成祖之後典籍殘缺而無徵僧行徒有其名而不知奚事茫茫八表求一律寺且不可得何曾有禪教淨土之叢林耶突出陽明夫子以應化大權創良知之説揭禪宗語和會融通使儒門英傑始知趣向然而未光大也時有雲棲大師實古佛之應身愍斯惡世來生此間少稟生知為當代巨儒頓除恩愛示菩薩遍行其以身教衆生也則有萬德種之妙行其以語教衆生也則有百千卷之牙籤禪則有禪關䇿進等教則有楞嚴摸象等律則有戒疏發隱等淨土則有彌陀疏鈔等校謬則有正訛集等典籍迷謬者必援古以證僧行邪倒者必善巧攝持三槐碩德八表高流莫不望風歸附其親炙者必傾心伏膺羅列祖之行門罄無不盡振千載之頺綱萬目畢張雖其大用如此皆以淨土為指歸也故知圓頓之旨與淨土法門何矛盾之有哉問曰雲棲大師謂良知非真知又云王陽明於佛法未有深得斯言何謂也答曰學道之人切莫競執名言貴在真實體認用處幽玄體認得真是亦可也非亦可也體認不真是亦不可非亦不可何則古德云老僧把丈六金身作一莖草用也得把一莖草作丈六金身用也得雲棲大師云良知非真知即把丈六金身作一莖草用也可謂用處幽玄矣陽明夫子云良知即真知此則把一莖草作丈六金身用也固不敢保其真實親證亦可謂隨順信解矣何則世尊發明三界惟心萬法惟識而攝之以三性曰成自性曰緣起性曰遍計性一切諸法緣會而生見聞知覺皆緣起性軻氏云所不慮而知者良知也孩提之童無不知愛其親及其長也無不知敬其兄是則緣親而心起孝緣兄而心起悌達之天下則緣君而起忠緣民而起仁皆良知也故知孝悌忠愛的為緣起性矣祖師道若喚這個是是頭上安頭若喚這個不是是斬頭覓活不落二邊方為究竟問曰一切諸法皆緣起性既聞命矣其成自性云何體認答曰成自性者真知之體也緣起性者真知之用也遍計性者真知本具為外道邪見衆生以妄想識情迷謬妄執者也故華嚴云奇哉衆生具有如來智慧德相乃因妄想執著而不證得楞嚴亦云一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故受輪轉所言真知者即常住真心亦名實相般若是諸法自性聖凡本具非中外而徹十方無去來而通三際為一切衆生本來面目一而不二者也其體絶相絶稱纖塵不立易曰寂然不動感而遂通天下之故感而遂通者真知之用也故曰聖心無知而無所不知是以聖人虗其心而實其照終日知而未嘗知良有以也先德云智有窮幽之鑒而無知焉神有應會之用而無慮焉神無慮故能獨王於世表智無知故能玄照於事外知雖事外未始無事神雖世表終日中所以俯仰順化應接無窮無幽不察而無照功是為無知之所知神聖之所會也子亦曰吾有知乎哉無知也問曰如上所言則陽明夫子為頭上安頭雲棲大師為斬頭覓活何大言若是之無慚也答曰癡人面前莫説夢信矣前不云乎學道之人莫兢名言貴在真實體認用處幽玄雲門老祖云吾有一句函蓋乾坤吾有一句截斷衆流吾有一句隨波逐浪當知良知即真知者乃巧心妙手函蓋乾坤之説也良知非真知者乃獨露真常截斷衆流之説也何則前不云乎未發謂之中發而中節謂之和發即未發未發即發謂之致中和良知亦然軻氏云所不慮而知者乃未發之良知也孩提之童無不知愛其親也及其長也無不知敬其兄也乃發而中節之良知也陽明夫子據未發之良知故曰良知即真知雲棲大師據發而中節之良知故曰良知非真知又真知者極其廣大淵微如上云云而今人不知從何所詣陽明夫子欲使人就路還家故向孝悌上一點曰良知即真知也後人見與麼説便執此外更無真知不知色身外洎山河虗空大地咸是妙明真心中所現物奚止孝悌忠愛與見聞覺知而已譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤雲棲大師欲破其病使人直窮到底故曰良知非真知也洞山老祖亦云嗟見今時學道流千千萬萬認門頭却似入京朝帝主未到潼關卒便休當知百尺竿頭更須進步問曰如師所言不落二邊方為究竟究竟之説願垂開示答曰經云十方如來及大菩薩於其自住三摩地中見與見緣併所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是以本無所有故不可頭上安頭以元是菩提故不可斬頭覓活如病目人見空中華空本無花病者妄見故不可説是非二相問曰或謂良知者孝悌也陽明之説良知者真知也所謂仁也性也常住真心實相般若皆一體也奚止孝悌而已不識二者之説同耶異耶答曰前不云乎陽明以巧心妙手欲使人就路還家作此説也況體外無用全用即體故曰良知即真知又云學人貴在體認真實莫兢名言良知真知皆名言也須體三性之所歸始悟自心之玄妙何則仁也性也常住真心也皆成自性也孝悌忠信也見聞覺知也皆緣起性也或人以緣起性達成自性故云云陽明以緣起性即成自性故云云二者但頓漸有異耳非見理有別也時人執此為究竟者如認潼關之卒為九五之尊良可悲夫問曰遍計執性其相云何答曰教有明文無勞廣舉請説其略即時人不識真知之微妙亦不悟見聞知覺乃自性之緣起妄指運動施為即良知之究竟皆遍計執也所以宗門下呵此輩為弄精魂呈詐偽驢前馬後事又云認賊為子喚奴作郎如是名言種種不一問曰成自性者體也緣起性者用也緣善則善緣惡則惡皆緣起性也此與告子曰性猶湍水也決諸東方則東流決諸西方則西流何以異也答曰唯識論云緣起性即依他起雖只一名而有二種一曰淨分依他緣善而起猶水之就下也一曰染分依他緣惡而起猶水搏而躍之也告子言性四章皆以知覺運動而言正所謂遍計執也不悟自心彌滿清淨其迷謬邪執不待言矣西域九十六種外道曾無如是之卑劣者但宋儒曾不知佛法之毫末而妄言佛氏以作用為性者略相似其自安淺陋甚至於此可笑可笑問曰孟子謂性善告子謂性無善無不善或曰性可以為善可以為不善或曰有性善有性不善如是諸説何者稍似答曰固不敢保孟子見處與祖佛相等然其言説了無滲漏何則其以仁義禮智則曰我固有之矣又指四心為仁義禮智之端其利於世孰能加焉論云心真如者即是一法界大總相法門體其義有三種一而不異云何為三一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世出世間善因果故舉一即三言三即一故曰總相法門告子曰無善無不善則真性失妙有之宗至道落偏空之咎孟子曰性善乃若其情則可以為善矣乃所謂善也此與三大之文頗有似處何則此曰性善論曰如來藏具足無量性功德故此曰乃若其情則可以為善矣則未動已前信為空空如也論曰一切法真如平等不增減故其他諸説皆遍計執也問曰今之學道者前後蒼黃其故何哉答曰唯識論云菩薩於一阿僧祇修勝行時有三退屈後以三事練磨其心勇猛不退梵語阿僧祇此云不可數況初心者何等為三一聞無上菩提廣大深遠心便退屈引他已證大菩提者練磨其心勇猛不退謂諸佛與我同為凡夫彼既丈夫我亦爾不應自輕而退屈也二聞六波羅密甚難可修心便退屈省己意樂能修施等練磨其心勇猛不退即所謂是路何愁不可行也三聞諸佛圓滿轉依極難可證心便退屈引他粗善況已妙因練磨其心勇猛不退謂三世諸佛舉首低頭皆成佛道況其他哉彼初心者見理不徹信道不篤但向皮膚上著力所以始欲為多末遂減少或觸事則依事生心或緣無則依無息念直待其見理漸深根器成熟或一念開悟自然究竟不退問曰宗門下有死句活句何以分別答曰古人雖有死句活句之分其實用處在人不在句也智者用活句自然是活句又將死句作活句用愚人用死句自然是死句又將活句作死句用凡一句語不落言詮不墮理路不入思惟不容擬議千變萬化八面受敵者謂之活句落言詮理路思惟分別者謂之死句如古德問僧云九峰和尚有何言句僧云某問九峰如何是學人自己九峰云丙丁童子來求火古德云汝意如何僧云丙丁是火即是以火求火古德叱之僧求示古德厲聲云丙丁童子來求火僧豁然大悟九峰所謂丙丁童子來求火乃活句也如僧之分別擬議乃將活句作死句用也如古德厲聲云丙丁童子來求火乃將死句作活句用也一千七百祖師三千七百公案其用處莫不如此
